# Mock 3-tank cascade cabinet — Modbus TCP server (mock_cabinet.py).
#
# 8 holding registers, FC 3/6/16. `address` is the 0-based protocol register
# address (= PLC 4xxxx - 40001). Scale/units live in ia2_config.json.
#
# Uses the legacy top-level {host, port} shape which IA2 auto-upgrades to
# ModbusTransport::Tcp on load (see crates/project/src/types.rs).
#
#   40001 addr 0 : Tank 1 Level        40005 addr 4 : Tank 3 Level
#   40002 addr 1 : Tank 1 Temperature  40006 addr 5 : Tank 3 Temperature
#   40003 addr 2 : Tank 2 Level        40007 addr 6 : Actuator 1 (pump 1)
#   40004 addr 3 : Tank 2 Temperature  40008 addr 7 : Actuator 2 (pump 2)

name = "mock_cabinet"
protocol = "modbus"
host = "127.0.0.1"
port = 5020
slave_id = 1
poll_interval_ms = 50

[[channels]]
name = "tank1_level"
kind = "holding_register"
address = 0
data_type = "u16"
[[channels]]
name = "tank1_temp"
kind = "holding_register"
address = 1
data_type = "u16"
[[channels]]
name = "tank2_level"
kind = "holding_register"
address = 2
data_type = "u16"
[[channels]]
name = "tank2_temp"
kind = "holding_register"
address = 3
data_type = "u16"
[[channels]]
name = "tank3_level"
kind = "holding_register"
address = 4
data_type = "u16"
[[channels]]
name = "tank3_temp"
kind = "holding_register"
address = 5
data_type = "u16"
[[channels]]
name = "actuator1"
kind = "holding_register"
address = 6
data_type = "u16"
[[channels]]
name = "actuator2"
kind = "holding_register"
address = 7
data_type = "u16"
